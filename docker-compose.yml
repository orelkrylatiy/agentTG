version: '3.8'

services:
  telegram-ai-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: telegram-ai-agent
    restart: unless-stopped
    volumes:
      # Persist session and database
      - ./data:/app/data
      # Persist LiteLLM ChatGPT OAuth tokens
      - ./data/litellm:/app/data/litellm
      # Mount .env file
      - ./.env:/app/.env:ro
    environment:
      - PYTHONUNBUFFERED=1
    command: >
      sh -c "mkdir -p /app/data/litellm/chatgpt &&
             chmod 700 /app/data/litellm/chatgpt &&
             python -m tg_agent.main"
    # Optional: set timezone
    # - TZ=Europe/Moscow
    networks:
      - agent-network

networks:
  agent-network:
    driver: bridge
